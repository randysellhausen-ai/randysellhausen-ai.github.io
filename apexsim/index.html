<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>APEXSIM Test</title>
    <style>
        body {
            background: #000;
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
    </style>
</head>

<body>

    <!-- ========================================================= -->
    <!-- APEXSIM CANVAS                                            -->
    <!-- ========================================================= -->
    <canvas id="apexsim-canvas" width="800" height="600" style="background:#111;"></canvas>

    <!-- ========================================================= -->
    <!-- APEXSIM ENGINE FILES (correct paths for your repo)        -->
    <!-- ========================================================= -->
    <script src="apexsim.js"></script>
    <script src="apexsim-core.js"></script>
    <script src="apexsim-engine.js"></script>
    <script src="apexsim-systems.js"></script>
    <script src="apexsim-modules.js"></script>
    <script src="apexsim-ui.js"></script>
    <script src="apexsim-renderer.js"></script>
    <script src="apexsim-physics.js"></script>
    <script src="apexsim-data.js"></script>
    <script src="apexsim-debug.js"></script>
    <script src="stance/apex-stance.js"></script>
    <script src="apexsim-test.js"></script>

    <!-- ========================================================= -->
    <!-- APEXSIM BOOT SEQUENCE                                     -->
    <!-- ========================================================= -->
    <script>
        // Attach canvas
        const canvas = document.getElementById("apexsim-canvas");
        window.APEXSIM.UI.attachCanvas(canvas);

        // Spawn test unit
        window.APEXSIM.Test.spawnTestUnit();

        // Main simulation loop
        function loop() {
            window.APEXSIM.Engine.update();
            window.APEXSIM.Renderer.draw();
            requestAnimationFrame(loop);
        }

        loop();
    </script>

</body>
</html>
